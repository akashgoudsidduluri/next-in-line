name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          # Using a generic placeholder for the service definition
          POSTGRES_DB: hiring_pipeline
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Build
        run: pnpm run build

      - name: Provision Test Environment
        run: |
          # Provision dynamic, non-hardcoded credentials for the test runner
          # We use 'trust' for the local-only CI container to eliminate password exposure
          DB_URL="postgresql://postgres@localhost:5432/hiring_pipeline"
          echo "DATABASE_URL=$DB_URL" >> $GITHUB_ENV
          
          # Generate a one-time-use session secret for this specific CI run
          S_SEC="ci_$(openssl rand -hex 16)"
          echo "::add-mask::$S_SEC"
          echo "SESSION_SECRET=$S_SEC" >> $GITHUB_ENV
      
      - name: Push Database Schema
        run: pnpm --filter @workspace/db run push
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
      
      - name: Run tests
        run: pnpm --filter @workspace/api-server run test
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          SESSION_SECRET: ${{ env.SESSION_SECRET }}
